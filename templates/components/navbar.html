<!-- Academia Navbar — Top Navigation -->
<header class="relative z-10 flex-shrink-0 flex h-14 items-center border-b" 
        style="background-color: #251E19; border-color: #4A3F35;">

    <!-- Mobile sidebar toggle -->
    <button type="button" 
            @click="sidebarOpen = true"
            class="px-4 lg:hidden focus-visible:outline-none"
            style="color: #9C8B7A; border-right: 1px solid #4A3F35; height: 100%;"
            aria-label="Open sidebar">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h8m-8 6h16"/>
        </svg>
    </button>
    
    <!-- Search -->
    <div class="flex-1 flex items-center px-4 lg:px-6">
        <form class="w-full max-w-md" action="{% url 'core:search' %}" method="get" role="search">
            <label for="search-field" class="sr-only">Search</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none" aria-hidden="true">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="color: #4A3F35;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803a7.5 7.5 0 0010.607 10.607z"/>
                    </svg>
                </div>
                <input id="search-field"
                       type="search"
                       name="q"
                       value="{{ request.GET.q }}"
                       placeholder="Search courses, files, generations…"
                       class="academia-input pl-9"
                       style="height: 2.25rem; font-size: 0.9375rem; font-style: italic;">
            </div>
        </form>
    </div>
    
    <!-- Right side -->
    <div class="flex items-center gap-2 pr-4 lg:pr-6">
        
        <!-- Quick Create — brass ghost buttons -->
        <div class="hidden lg:flex items-center gap-1">
            <a href="{% url 'courses:create' %}" class="btn-ghost" style="font-size: 0.5625rem; padding: 0.4rem 0.75rem;" title="New Course">
                <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.966 8.966 0 00-6 2.292m0-14.25v14.25"/>
                </svg>
                Course
            </a>
            <a href="{% url 'ai_generator:quiz_generator' %}" class="btn-ghost" style="font-size: 0.5625rem; padding: 0.4rem 0.75rem;" title="Generate AI Quiz">
                <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
                </svg>
                AI Quiz
            </a>
        </div>

        <!-- Divider -->
        <div class="hidden lg:block w-px h-6 self-center" style="background: #4A3F35;"></div>

        <!-- User menu -->
        <div class="relative" x-data="{ open: false }">
            <button type="button"
                    @click="open = !open"
                    class="flex items-center gap-2.5 focus-visible:outline-none rounded"
                    style="padding: 0.25rem; outline-offset: 4px;"
                    id="user-menu-button"
                    :aria-expanded="open.toString()">
                <span class="sr-only">Open user menu</span>

                <!-- Avatar -->
                {% if user.avatar %}
                    <img class="h-7 w-7 rounded-full object-cover" 
                         style="border: 1px solid #4A3F35;"
                         src="{{ user.avatar.url }}" 
                         alt="{{ user.get_full_name }}">
                {% else %}
                    <span class="inline-flex h-7 w-7 items-center justify-center rounded-full flex-shrink-0"
                          style="background: linear-gradient(180deg, #D4B872 0%, #B8953F 100%); border: 1px solid #9C8B7A;">
                        <span class="text-xs font-semibold" 
                              style="font-family: 'Cinzel', serif; color: #1C1714; text-shadow: 1px 1px 1px rgba(0,0,0,0.3);">
                            {{ user.get_full_name|slice:':1'|upper }}
                        </span>
                    </span>
                {% endif %}

                <div class="hidden lg:block text-left">
                    <p class="text-sm leading-none truncate max-w-[120px]" 
                       style="font-family: 'Crimson Pro', serif; color: #E8DFD4;">
                        {{ user.get_full_name|truncatechars:18 }}
                    </p>
                    {% if user.is_admin %}
                    <p class="academia-badge academia-badge-brass mt-0.5" style="font-size: 0.45rem; padding: 0.1rem 0.4rem;">Scholar</p>
                    {% endif %}
                </div>

                <svg :class="{ 'rotate-180': open }" 
                     class="h-3.5 w-3.5 transition-transform duration-300" 
                     fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" 
                     style="color: #9C8B7A;" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
                </svg>
            </button>

            <!-- Dropdown menu -->
            <div x-show="open"
                 @click.away="open = false"
                 x-transition:enter="transition ease-out duration-150"
                 x-transition:enter-start="opacity-0 scale-95 -translate-y-1"
                 x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-100"
                 x-transition:leave-start="opacity-100 scale-100 translate-y-0"
                 x-transition:leave-end="opacity-0 scale-95 -translate-y-1"
                 class="absolute right-0 mt-2 w-56 rounded z-50 overflow-hidden"
                 style="display:none; background: #251E19; border: 1px solid #4A3F35; box-shadow: 0 8px 24px rgba(0,0,0,0.4);"
                 role="menu"
                 aria-labelledby="user-menu-button">

                <!-- User info header -->
                <div class="px-4 py-3" style="border-bottom: 1px solid #4A3F35;">
                    <p class="text-sm leading-tight" style="font-family: 'Crimson Pro', serif; color: #E8DFD4;">
                        {{ user.get_full_name }}
                    </p>
                    <p class="text-xs mt-0.5 truncate" style="color: #9C8B7A; font-family: 'Crimson Pro', serif;">{{ user.email }}</p>
                    {% if user.institution %}
                    <p class="text-xs mt-0.5 truncate" style="color: #4A3F35; font-family: 'Crimson Pro', serif; font-style: italic;">{{ user.institution }}</p>
                    {% endif %}
                </div>

                <!-- Menu items -->
                <nav role="none">
                    <a href="{% url 'accounts:profile' %}" 
                       class="flex items-center gap-3 px-4 py-2.5 text-sm transition-colors duration-200"
                       style="font-family: 'Crimson Pro', serif; color: #9C8B7A;"
                       onmouseover="this.style.background='rgba(74,63,53,0.3)'; this.style.color='#C9A962';"
                       onmouseout="this.style.background=''; this.style.color='#9C8B7A';"
                       role="menuitem">
                        <svg class="h-4 w-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" aria-hidden="true" style="color: #4A3F35;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                        </svg>
                        Your Profile
                    </a>

                    {% if user.is_admin %}
                    <a href="{% url 'admin:index' %}" 
                       class="flex items-center gap-3 px-4 py-2.5 text-sm transition-colors duration-200"
                       style="font-family: 'Crimson Pro', serif; color: #9C8B7A;"
                       onmouseover="this.style.background='rgba(74,63,53,0.3)'; this.style.color='#C9A962';"
                       onmouseout="this.style.background=''; this.style.color='#9C8B7A';"
                       role="menuitem">
                        <svg class="h-4 w-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" aria-hidden="true" style="color: #4A3F35;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
                        </svg>
                        Admin Panel
                    </a>
                    {% endif %}

                    <div style="border-top: 1px solid #4A3F35; margin: 0.25rem 0;"></div>

                    <a href="mailto:support@didactai.com" 
                       class="flex items-center gap-3 px-4 py-2.5 text-sm transition-colors duration-200"
                       style="font-family: 'Crimson Pro', serif; color: #9C8B7A;"
                       onmouseover="this.style.background='rgba(74,63,53,0.3)'; this.style.color='#C9A962';"
                       onmouseout="this.style.background=''; this.style.color='#9C8B7A';"
                       role="menuitem">
                        <svg class="h-4 w-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" aria-hidden="true" style="color: #4A3F35;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/>
                        </svg>
                        Help & Support
                    </a>

                    <div style="border-top: 1px solid #4A3F35; margin: 0.25rem 0;"></div>

                    <form method="post" action="{% url 'accounts:logout' %}">
                        {% csrf_token %}
                        <button type="submit"
                                class="w-full flex items-center gap-3 px-4 py-2.5 text-sm transition-colors duration-200"
                                style="font-family: 'Crimson Pro', serif; color: #9C8B7A; background: none; border: none; cursor: pointer; text-align: left;"
                                onmouseover="this.style.background='rgba(139,38,53,0.15)'; this.style.color='#c94258';"
                                onmouseout="this.style.background=''; this.style.color='#9C8B7A';"
                                role="menuitem">
                            <svg class="h-4 w-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" aria-hidden="true" style="color: #4A3F35;">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
                            </svg>
                            Sign out
                        </button>
                    </form>
                </nav>
            </div>
        </div>
    </div>
</header>
