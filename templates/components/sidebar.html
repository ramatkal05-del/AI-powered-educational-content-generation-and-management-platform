<!-- Academia Sidebar — Mobile Backdrop -->
<div class="fixed inset-0 flex z-40 lg:hidden" 
     x-show="sidebarOpen" 
     x-transition:enter="transition-opacity ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition-opacity ease-in duration-300"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     style="display: none;"
     aria-modal="true"
     role="dialog">
    
    <!-- Backdrop -->
    <div class="fixed inset-0" style="background: rgba(28,23,20,0.75);" @click="sidebarOpen = false"></div>
    
    <!-- Mobile sidebar panel -->
    <div class="relative flex-1 flex flex-col max-w-xs w-full py-5"
         style="background: #251E19; border-right: 1px solid #4A3F35;"
         x-transition:enter="transition ease-out duration-300 transform"
         x-transition:enter-start="-translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-300 transform"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="-translate-x-full">
        
        <!-- Close button -->
        <div class="absolute top-3 right-0 -mr-11">
            <button type="button" 
                    @click="sidebarOpen = false"
                    class="ml-1 flex items-center justify-center h-10 w-10 rounded focus-visible:outline-none"
                    style="background: rgba(74,63,53,0.4); color: #9C8B7A;"
                    aria-label="Close sidebar">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        
        {% include 'components/sidebar_content.html' %}
    </div>
    
    <!-- Spacer -->
    <div class="flex-shrink-0 w-14" aria-hidden="true"></div>
</div>

<!-- Desktop sidebar -->
<aside class="hidden lg:flex lg:flex-shrink-0" role="navigation" aria-label="Main navigation">
    <div class="flex flex-col w-64 py-5" style="background: #251E19; border-right: 1px solid #4A3F35;">
        {% include 'components/sidebar_content.html' %}
    </div>
</aside>
